<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carry the Ring</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060309;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Palatino Linotype', Palatino, Georgia, serif;
    user-select: none;
    overflow: hidden;
  }
  canvas { display: block; }
  #hint {
    color: #6a4e2a;
    font-size: 11px;
    letter-spacing: 2px;
    margin-top: 8px;
    opacity: 0.5;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<p id="hint">WASD / ARROW KEYS · SPACE TO START</p>

<script>
'use strict';

// ── SETUP ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = 800, H = 480;
canvas.width  = W;
canvas.height = H;

// Fixed star positions
const STARS = Array.from({length: 60}, () => ({
  x: Math.random() * W,
  y: Math.random() * H * 0.52,
  r: Math.random() * 0.9 + 0.3,
  twinkle: Math.random() * Math.PI * 2,
}));

// ── INPUT ─────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key === ' ' && state !== 'playing') startGame();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// ── STATE ─────────────────────────────────────────────────────────────────
let state = 'title'; // 'title' | 'playing' | 'gameover' | 'win'
let frodo, wraiths, particles, eye, shake, timers;

function startGame() {
  frodo = {
    x: 80, y: H * 0.62,
    r: 11,
    lives: 3,
    invincible: false,
    invTimer: 0,
    hitFlash: 0,
    ringAngle: 0,
    deathAlpha: 0,
  };

  wraiths = [];
  for (let i = 0; i < 3; i++) spawnWraith();

  particles = [];

  eye = {
    phase: 'idle',   // 'idle' | 'warning' | 'active' | 'closing'
    timer: 0,
    open: 0,         // 0=closed … 1=fully open
    idleDur:  20 + Math.random() * 8,
    activeDur: 7,
    warnDur:   2.5,
    closeDur:  1.5,
    px: W / 2, py: 65, // pupil position
  };

  shake  = { x: 0, y: 0, dur: 0, intensity: 0 };
  timers = { elapsed: 0, spawnCD: 0 };

  state = 'playing';
}

// ── SPAWN ─────────────────────────────────────────────────────────────────
function spawnWraith() {
  const edge = Math.floor(Math.random() * 3); // 0=top 1=bottom 2=left
  let x, y;
  switch (edge) {
    case 0: x = 40 + Math.random() * (W - 80); y = -35; break;
    case 1: x = 40 + Math.random() * (W - 80); y = H + 35; break;
    default: x = -35; y = H * 0.35 + Math.random() * H * 0.5;
  }
  wraiths.push({
    x, y, r: 14,
    wanderAngle: Math.random() * Math.PI * 2,
    wanderTimer: 0,
    speed: 1.1 + Math.random() * 0.5,
    capePhase: Math.random() * Math.PI * 2,
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function progress() {
  return Math.max(0, Math.min(1, (frodo.x - 80) / 650));
}
function frodoSpeed() {
  return 3.6 - progress() * 2.1; // 3.6 → 1.5
}
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}
function lerp(a, b, t) { return a + (b - a) * t; }

// ── GAME LOOP ─────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── UPDATE ────────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing') return;
  timers.elapsed += dt;

  // Frodo movement
  const spd = frodoSpeed();
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }

  frodo.x = Math.max(frodo.r, Math.min(W - frodo.r, frodo.x + dx * spd * 60 * dt));
  frodo.y = Math.max(H * 0.3,  Math.min(H - frodo.r * 2,  frodo.y + dy * spd * 60 * dt));
  frodo.ringAngle += dt * (1.2 + progress() * 2.5);

  // Win condition
  if (frodo.x >= 745) { state = 'win'; return; }

  // Invincibility
  if (frodo.invincible) {
    frodo.invTimer -= dt;
    if (frodo.invTimer <= 0) frodo.invincible = false;
  }
  frodo.hitFlash = Math.max(0, frodo.hitFlash - dt * 4);

  // Eye of Sauron state machine
  eye.timer += dt;
  if (eye.phase === 'idle') {
    eye.open = Math.max(0, eye.open - dt * 1.5);
    if (eye.timer >= eye.idleDur) { eye.phase = 'warning'; eye.timer = 0; }

  } else if (eye.phase === 'warning') {
    eye.open = Math.min(0.25, eye.open + dt * 0.4);
    if (eye.timer >= eye.warnDur) { eye.phase = 'active'; eye.timer = 0; }

  } else if (eye.phase === 'active') {
    eye.open = Math.min(1, eye.open + dt * 2.5);
    // Pupil tracks Frodo
    eye.px = lerp(eye.px, lerp(W * 0.2, W * 0.8, frodo.x / W), dt * 2);
    eye.py = lerp(eye.py, 65 + (frodo.y / H - 0.5) * 30, dt * 2);
    if (eye.timer >= eye.activeDur) { eye.phase = 'closing'; eye.timer = 0; }

  } else if (eye.phase === 'closing') {
    eye.open = Math.max(0, eye.open - dt * 1.2);
    if (eye.timer >= eye.closeDur) {
      eye.phase = 'idle'; eye.timer = 0;
      eye.idleDur = Math.max(8, 18 - progress() * 9 + Math.random() * 5);
    }
  }

  const eyeActive = eye.phase === 'active';

  // Wraiths
  wraiths.forEach(w => {
    w.capePhase += dt * 1.8;
    w.wanderTimer -= dt;

    if (eyeActive) {
      const angle = Math.atan2(frodo.y - w.y, frodo.x - w.x);
      const s = w.speed * 1.9 * 60 * dt;
      w.x += Math.cos(angle) * s;
      w.y += Math.sin(angle) * s;
    } else {
      if (w.wanderTimer <= 0) {
        // Slightly biased toward Frodo
        const toFrodo = Math.atan2(frodo.y - w.y, frodo.x - w.x);
        w.wanderAngle = toFrodo + (Math.random() - 0.5) * Math.PI * 1.6;
        w.wanderTimer = 1.2 + Math.random() * 2;
      }
      const s = w.speed * 0.85 * 60 * dt;
      w.x += Math.cos(w.wanderAngle) * s;
      w.y += Math.sin(w.wanderAngle) * s;
    }

    // Push back toward arena if too far off screen
    if (w.x < -80 || w.x > W + 80 || w.y < -80 || w.y > H + 80) {
      w.wanderAngle = Math.atan2(H * 0.55 - w.y, W * 0.5 - w.x) + (Math.random() - 0.5) * 0.6;
      w.wanderTimer = 2;
    }

    // Collision
    if (!frodo.invincible && dist(frodo, w) < frodo.r + w.r) {
      frodo.lives--;
      frodo.invincible = true;
      frodo.invTimer   = 2.8;
      frodo.hitFlash   = 1;
      shake = { x: 0, y: 0, dur: 0.45, intensity: 9 };
      spawnParticles(frodo.x, frodo.y);
      if (frodo.lives <= 0) { state = 'gameover'; }
    }
  });

  // Spawn more wraiths as progress grows
  timers.spawnCD -= dt;
  const want = 3 + Math.floor(progress() * 3.5);
  if (wraiths.length < want && timers.spawnCD <= 0) {
    spawnWraith();
    timers.spawnCD = 4 + Math.random() * 3;
  }

  // Screen shake
  if (shake.dur > 0) {
    shake.dur -= dt;
    shake.x = (Math.random() - 0.5) * shake.intensity * 2;
    shake.y = (Math.random() - 0.5) * shake.intensity * 2;
  } else { shake.x = shake.y = 0; }

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x  += p.vx * dt * 60;
    p.y  += p.vy * dt * 60;
    p.vy += 0.08 * dt * 60;
    p.life -= dt;
    p.size = Math.max(0, p.size - dt * 4);
  });
}

function spawnParticles(x, y) {
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2 + Math.random() * 0.4;
    const s = 1.2 + Math.random() * 3.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.5,
      life: 0.5 + Math.random() * 0.4,
      size: 3 + Math.random() * 3,
      color: Math.random() > 0.5 ? '#d4a020' : '#903010',
    });
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────
function draw() {
  ctx.save();
  if (shake.x || shake.y) ctx.translate(shake.x, shake.y);

  drawBackground();

  if (state !== 'title') {
    drawWraiths();
    drawFrodo();
    drawParticles();
    if (eye.open > 0.02) drawEye();
    if (eye.phase === 'active')  drawRedOverlay();
    if (eye.phase === 'warning') drawWarningFlicker();
    drawUI();
  }

  if (state === 'title')    drawTitle();
  if (state === 'gameover') drawGameOver();
  if (state === 'win')      drawWin();

  ctx.restore();
}

// ── BACKGROUND ────────────────────────────────────────────────────────────
function drawBackground() {
  const t = lastTs / 1000;

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  sky.addColorStop(0, '#04020a');
  sky.addColorStop(1, '#0e080f');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * 0.55);

  // Stars
  STARS.forEach(s => {
    const alpha = 0.4 + Math.sin(t * 0.8 + s.twinkle) * 0.25;
    ctx.fillStyle = `rgba(255,250,220,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Mount Doom glow (right horizon)
  const doomGlow = ctx.createRadialGradient(W, H * 0.5, 0, W, H * 0.5, 340);
  doomGlow.addColorStop(0,   'rgba(255,70,5,0.5)');
  doomGlow.addColorStop(0.35,'rgba(180,35,3,0.25)');
  doomGlow.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = doomGlow;
  ctx.fillRect(0, 0, W, H);

  // Shire glow (left)
  const shire = ctx.createRadialGradient(0, H * 0.5, 0, 0, H * 0.5, 200);
  shire.addColorStop(0,  'rgba(70,130,35,0.12)');
  shire.addColorStop(1,  'rgba(0,0,0,0)');
  ctx.fillStyle = shire;
  ctx.fillRect(0, 0, W, H);

  // Ground
  const ground = ctx.createLinearGradient(0, H * 0.5, 0, H);
  ground.addColorStop(0, '#1c1108');
  ground.addColorStop(1, '#0c0904');
  ctx.fillStyle = ground;
  ctx.fillRect(0, H * 0.5, W, H * 0.5);

  // Dirt road
  ctx.save();
  const road = ctx.createLinearGradient(0, H * 0.48, 0, H * 0.62);
  road.addColorStop(0, 'rgba(65,48,20,0.9)');
  road.addColorStop(1, 'rgba(40,28,10,0.4)');
  ctx.fillStyle = road;
  ctx.beginPath();
  ctx.moveTo(0,   H * 0.46);
  ctx.lineTo(W,   H * 0.44);
  ctx.lineTo(W,   H * 0.60);
  ctx.lineTo(0,   H * 0.62);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Horizon line
  ctx.strokeStyle = 'rgba(90,55,18,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H * 0.5); ctx.lineTo(W, H * 0.5); ctx.stroke();

  // Distant mountains silhouette
  ctx.fillStyle = '#080508';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.5);
  [180,0, 240,0.08, 310,-0.02, 400,0.06, 480,0, 560,0.07, 640,0.01, 720,0.05, W,0].forEach((v,i,a) => {
    if (i % 2 === 0) ctx.lineTo(a[i], H * (0.5 - a[i+1]));
  });
  ctx.lineTo(W, H * 0.5); ctx.closePath(); ctx.fill();

  // Mount Doom silhouette (right)
  ctx.fillStyle = '#0a0304';
  ctx.beginPath();
  ctx.moveTo(W - 70, H * 0.5);
  ctx.lineTo(W - 28, H * 0.18);
  ctx.lineTo(W,      H * 0.24);
  ctx.lineTo(W,      H * 0.5);
  ctx.closePath();
  ctx.fill();

  // Lava crack
  ctx.save();
  ctx.shadowColor = '#ff5000';
  ctx.shadowBlur  = 8;
  const lava = ctx.createLinearGradient(W - 32, H * 0.22, W - 18, H * 0.5);
  lava.addColorStop(0,   'rgba(255,100,0,0.0)');
  lava.addColorStop(0.3, 'rgba(255,80,0,0.8)');
  lava.addColorStop(1,   'rgba(255,160,0,0.6)');
  ctx.strokeStyle = lava;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(W - 28, H * 0.22);
  ctx.bezierCurveTo(W - 35, H * 0.31, W - 22, H * 0.38, W - 20, H * 0.5);
  ctx.stroke();
  ctx.restore();

  // Progress-based doom glow intensification
  if (state === 'playing') {
    const p = progress();
    const g2 = ctx.createRadialGradient(W, H * 0.5, 0, W, H * 0.5, 200 + p * 100);
    g2.addColorStop(0, `rgba(255,60,0,${p * 0.25})`);
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);
  }
}

// ── EYE OF SAURON ─────────────────────────────────────────────────────────
function drawEye() {
  const open = eye.open;
  const ex = W / 2, ey = 62;
  const ew = 75, eh = 32 * open;

  // Outer glow
  ctx.save();
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur  = 40 * open;
  const og = ctx.createRadialGradient(ex, ey, 0, ex, ey, ew * 1.8);
  og.addColorStop(0, `rgba(255,70,0,${0.35 * open})`);
  og.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = og;
  ctx.fillRect(ex - ew * 2, ey - ew, ew * 4, ew * 2);
  ctx.restore();

  // Eye shape (clipped)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ex - ew, ey);
  ctx.quadraticCurveTo(ex, ey - eh, ex + ew, ey);
  ctx.quadraticCurveTo(ex, ey + eh, ex - ew, ey);
  ctx.closePath();
  ctx.clip();

  // Fiery iris
  const iris = ctx.createRadialGradient(ex, ey, 1, ex, ey, ew);
  iris.addColorStop(0,   '#ff2000');
  iris.addColorStop(0.25,'#cc3500');
  iris.addColorStop(0.6, '#882000');
  iris.addColorStop(1,   '#3a0800');
  ctx.fillStyle = iris;
  ctx.fillRect(ex - ew, ey - eh, ew * 2, eh * 2);

  // Vertical slit pupil
  const px = lerp(ex - ew * 0.45, ex + ew * 0.45, Math.max(0, Math.min(1, eye.px / W)));
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(px, ey, 6, eh * 0.82, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Eyelid lines
  ctx.strokeStyle = `rgba(210,80,0,${0.85 * open})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ex - ew, ey);
  ctx.quadraticCurveTo(ex, ey - eh, ex + ew, ey);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(ex - ew, ey);
  ctx.quadraticCurveTo(ex, ey + eh, ex + ew, ey);
  ctx.stroke();
}

function drawRedOverlay() {
  const o = eye.open;
  ctx.fillStyle = `rgba(160,0,0,${o * 0.16})`;
  ctx.fillRect(0, 0, W, H);
  const v = ctx.createRadialGradient(W/2, H/2, H * 0.25, W/2, H/2, H * 0.85);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, `rgba(110,0,0,${o * 0.42})`);
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, W, H);
}

function drawWarningFlicker() {
  if (Math.random() > 0.65) {
    ctx.fillStyle = `rgba(200,50,0,${Math.random() * 0.09 * (eye.timer / eye.warnDur)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ── WRAITHS ───────────────────────────────────────────────────────────────
function drawWraiths() {
  const eyeActive = eye.phase === 'active';
  wraiths.forEach(w => {
    ctx.save();
    ctx.translate(w.x, w.y);

    // Glow
    const gc = eyeActive ? [130,20,200] : [55,10,100];
    const wg = ctx.createRadialGradient(0, 0, 0, 0, 0, w.r * 3);
    wg.addColorStop(0, `rgba(${gc},0.45)`);
    wg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = wg;
    ctx.fillRect(-w.r * 3, -w.r * 3, w.r * 6, w.r * 6);

    // Cape
    const wave = Math.sin(w.capePhase) * 5;
    ctx.fillStyle = eyeActive ? '#1c0535' : '#0e0220';
    ctx.beginPath();
    ctx.moveTo(0, -w.r * 1.1);
    ctx.lineTo(-w.r * 1.3, w.r * 0.4 + wave);
    ctx.lineTo(0, w.r * 2.1);
    ctx.lineTo(w.r * 1.3, w.r * 0.4 - wave);
    ctx.closePath();
    ctx.fill();

    // Hood
    ctx.fillStyle = eyeActive ? '#250842' : '#130128';
    ctx.beginPath();
    ctx.ellipse(0, -w.r * 0.9, w.r * 0.82, w.r * 0.92, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes (two dim glowing dots)
    ctx.save();
    ctx.shadowColor = eyeActive ? '#ff20a0' : '#600030';
    ctx.shadowBlur  = 4;
    ctx.fillStyle   = eyeActive ? '#ff50c0' : '#900060';
    [-3.5, 3.5].forEach(ex => {
      ctx.beginPath();
      ctx.arc(ex, -w.r * 0.9, 1.5, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.restore();

    ctx.restore();
  });
}

// ── FRODO ─────────────────────────────────────────────────────────────────
function drawFrodo() {
  if (!frodo) return;
  const p = progress();
  const t = timers.elapsed;

  ctx.save();
  ctx.translate(frodo.x, frodo.y);

  // Flicker when invincible
  if (frodo.invincible && Math.floor(t * 10) % 2 === 0) ctx.globalAlpha = 0.35;

  // Warm body glow (fades with progress)
  const warmth = 1 - p * 0.72;
  const bg = ctx.createRadialGradient(0, 0, 0, 0, 0, frodo.r * 3.5);
  bg.addColorStop(0, `rgba(195,155,70,${0.22 * warmth})`);
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(-frodo.r * 3.5, -frodo.r * 3.5, frodo.r * 7, frodo.r * 7);

  // Cloak
  ctx.fillStyle = `hsl(25,${38 - p * 15}%,${22 - p * 9}%)`;
  ctx.beginPath();
  ctx.ellipse(0, 3, frodo.r * 0.88, frodo.r * 1.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = `hsl(28,${48 - p * 12}%,${36 - p * 12}%)`;
  ctx.beginPath();
  ctx.arc(0, -frodo.r * 0.75, frodo.r * 0.72, 0, Math.PI * 2);
  ctx.fill();

  // The One Ring (orbits, glows brighter with progress)
  const rDist = frodo.r * 1.4;
  const rx    = Math.cos(frodo.ringAngle) * rDist * 0.6;
  const ry    = Math.sin(frodo.ringAngle) * rDist * 0.35 - frodo.r * 0.55;
  const rglow = 12 + p * 10;

  ctx.save();
  ctx.shadowColor = `rgba(255,180,20,${0.6 + p * 0.4})`;
  ctx.shadowBlur  = rglow;

  // Ring glow halo
  const rg = ctx.createRadialGradient(rx, ry, 0, rx, ry, rglow * 1.4);
  rg.addColorStop(0, `rgba(255,195,30,${0.35 + p * 0.45})`);
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(rx - rglow * 2, ry - rglow * 2, rglow * 4, rglow * 4);

  // Ring circle
  ctx.strokeStyle = `hsl(45,90%,${55 + p * 22}%)`;
  ctx.lineWidth   = 2.2 + p * 1.5;
  ctx.beginPath();
  ctx.arc(rx, ry, 5.5 + p * 2, 0, Math.PI * 2);
  ctx.stroke();

  // Fiery inscription (appears at high progress)
  if (p > 0.45) {
    ctx.strokeStyle = `rgba(255,120,0,${(p - 0.45) * 1.8})`;
    ctx.lineWidth   = 0.8;
    ctx.beginPath();
    ctx.arc(rx, ry, 7.5 + p * 2.2, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();

  // Hit flash
  if (frodo.hitFlash > 0) {
    ctx.fillStyle = `rgba(255,40,0,${frodo.hitFlash * 0.55})`;
    ctx.beginPath();
    ctx.arc(0, 0, frodo.r * 2.2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ── PARTICLES ─────────────────────────────────────────────────────────────
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life * 2.5);
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── UI ────────────────────────────────────────────────────────────────────
function drawUI() {
  const p = progress();
  const t = timers.elapsed;

  // Progress bar
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(10, 10, 210, 18);

  const bar = ctx.createLinearGradient(10, 0, 220, 0);
  bar.addColorStop(0,   '#3a6018');
  bar.addColorStop(0.5, '#9a6818');
  bar.addColorStop(1,   '#cc3808');
  ctx.fillStyle = bar;
  ctx.fillRect(10, 10, 210 * p, 18);

  ctx.strokeStyle = 'rgba(140,95,40,0.75)';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, 10, 210, 18);

  ctx.fillStyle = 'rgba(200,160,70,0.85)';
  ctx.font = '9px serif';
  ctx.textAlign = 'left';
  ctx.fillText('THE ROAD TO MOUNT DOOM', 13, 23);

  // Lives (ring icons)
  for (let i = 0; i < 3; i++) {
    const lx = W - 22 - i * 24;
    const lit = i < frodo.lives;
    ctx.save();
    if (lit) { ctx.shadowColor = '#d4a020'; ctx.shadowBlur = 8; }
    ctx.strokeStyle = lit ? '#d4a820' : '#3a2810';
    ctx.lineWidth   = lit ? 2.2 : 1;
    ctx.beginPath(); ctx.arc(lx, 19, 8, 0, Math.PI * 2); ctx.stroke();
    if (lit) {
      ctx.fillStyle = 'rgba(212,168,32,0.18)';
      ctx.beginPath(); ctx.arc(lx, 19, 8, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  // Eye warning pulse
  if (eye.phase === 'warning' && Math.sin(t * 11) > 0) {
    ctx.fillStyle = '#ff6010';
    ctx.font = 'bold 11px serif';
    ctx.textAlign = 'center';
    ctx.fillText('THE EYE OPENS...', W / 2, 32);
  }

  // Weight flavour text
  if (p > 0.12) {
    const msg = p < 0.38 ? 'The Ring grows heavy...'
              : p < 0.62 ? 'The burden is immense...'
              : p < 0.85 ? 'Every step a torment...'
                         : 'The fire draws near...';
    ctx.fillStyle = `rgba(200,138,38,${Math.min(1,(p - 0.12) * 2.2)})`;
    ctx.font = 'italic 11px serif';
    ctx.textAlign = 'center';
    ctx.fillText(msg, W / 2, H - 10);
  }
}

// ── SCREENS ───────────────────────────────────────────────────────────────
function drawTitle() {
  const t = lastTs / 1000;

  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  // Shadow + title
  ctx.font = 'bold 44px "Palatino Linotype",Palatino,Georgia,serif';
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillText('Carry the Ring', W/2 + 2, H/2 - 78 + 2);
  ctx.fillStyle = '#d4a020';
  ctx.fillText('Carry the Ring', W/2, H/2 - 78);

  ctx.font = 'italic 13px "Palatino Linotype",Palatino,Georgia,serif';
  ctx.fillStyle = '#9a7030';
  ctx.fillText('One ring to rule them all, one ring to find them...', W/2, H/2 - 30);

  // Pulsing ring
  const pulse = 1 + Math.sin(t * 2.2) * 0.12;
  ctx.save();
  ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 22 * pulse;
  ctx.strokeStyle = `hsl(45,90%,${55 + Math.sin(t*3)*8}%)`;
  ctx.lineWidth = 3 * pulse;
  ctx.beginPath(); ctx.arc(W/2, H/2 + 22, 22, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();

  ctx.font = '13px "Palatino Linotype",Palatino,Georgia,serif';
  ctx.fillStyle = 'rgba(175,132,68,0.9)';
  ctx.fillText('Reach the Crack of Doom before the Nazgûl take you', W/2, H/2 + 72);
  ctx.fillText('WASD / Arrow Keys to move  ·  3 lives', W/2, H/2 + 93);
  ctx.fillText('The Ring grows heavier — and the Eye never rests', W/2, H/2 + 114);

  if (Math.sin(t * 2.4) > 0) {
    ctx.fillStyle = '#c89040';
    ctx.font = 'bold 15px "Palatino Linotype",Palatino,Georgia,serif';
    ctx.fillText('— Press SPACE to begin —', W/2, H/2 + 148);
  }
}

function drawGameOver() {
  const t = lastTs / 1000;
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#8c0010';
  ctx.font = 'bold 40px "Palatino Linotype",Palatino,Georgia,serif';
  ctx.fillText('The Ring is Lost', W/2, H/2 - 44);

  ctx.fillStyle = '#704028';
  ctx.font = 'italic 15px "Palatino Linotype",Palatino,Georgia,serif';
  ctx.fillText('"All hope is gone. The Dark Lord has won."', W/2, H/2 + 4);

  if (Math.sin(t * 2.2) > 0) {
    ctx.fillStyle = '#803020';
    ctx.font = '14px serif';
    ctx.fillText('Press SPACE to try again', W/2, H/2 + 60);
  }
}

function drawWin() {
  const t = lastTs / 1000;

  // Fire background
  ctx.fillStyle = 'rgba(15,4,0,0.88)';
  ctx.fillRect(0, 0, W, H);

  const fire = ctx.createRadialGradient(W/2, H/2 + 40, 8, W/2, H/2 + 40, 280);
  fire.addColorStop(0,   `rgba(255,110,0,${0.55 + Math.sin(t*3)*0.08})`);
  fire.addColorStop(0.4, 'rgba(190,42,0,0.3)');
  fire.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = fire;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd060';
  ctx.font = 'bold 40px "Palatino Linotype",Palatino,Georgia,serif';
  ctx.fillText('It is done.', W/2, H/2 - 75);

  ctx.fillStyle = '#c07830';
  ctx.font = 'italic 15px "Palatino Linotype",Palatino,Georgia,serif';
  ctx.fillText('"My precious..."', W/2, H/2 - 30);

  // Falling ring
  const ry = H/2 + 20 + Math.sin(t * 1.6) * 9;
  ctx.save();
  ctx.shadowColor = '#ff7700'; ctx.shadowBlur = 30 + Math.sin(t * 4) * 10;
  ctx.strokeStyle = `hsl(45,92%,${58 + Math.sin(t*5)*10}%)`;
  ctx.lineWidth   = 3.5;
  ctx.beginPath(); ctx.arc(W/2, ry, 20, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#b07030';
  ctx.font = '14px "Palatino Linotype",Palatino,Georgia,serif';
  ctx.fillText('The One Ring is unmade. Middle-earth is free.', W/2, H/2 + 85);

  if (Math.sin(t * 2.2) > 0) {
    ctx.fillStyle = '#c08838';
    ctx.font = '14px serif';
    ctx.fillText('Press SPACE to play again', W/2, H/2 + 125);
  }
}

// ── GO ────────────────────────────────────────────────────────────────────
requestAnimationFrame(loop);
</script>
