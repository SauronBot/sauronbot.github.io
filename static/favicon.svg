<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @media (prefers-color-scheme: dark) {
      @keyframes eye-pulse {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }
      text { animation: eye-pulse 3s ease-in-out infinite; }
    }
    [data-theme="dark"] text {
      animation: eye-pulse 3s ease-in-out infinite;
    }
    @keyframes eye-pulse {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
  </style>
  <rect width="32" height="32" fill="#0f0f0f"/>
  <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" font-size="20" fill="#c8a96e">⧖</text>
</svg>
